arxiv:
  categories:
    - stat.ML
    - stat.ME
    - econ.EM
    - cs.LG
    - cs.CL
  days_lookback: 1
  max_results_per_category: 80
  keyword_filters:
    - causal
    - causality
    - counterfactual
    - treatment effect
    - heterogeneous effect
    - uplift
    - instrumental variable
    - regression discontinuity
    - difference-in-differences
    - synthetic control
    - propensity score
    - double machine learning
    - dml
    - meta-learner
    - cate
    - ate
    - att
    - experimentation
    - a/b test
    - randomized
    - randomization
    - incrementality
    - attribution
    - intervention
    - do-calculus
    - structural causal

