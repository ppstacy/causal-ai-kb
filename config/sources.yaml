github_trending:
  # Filters by "created:" (newly-created repos). min_stars=3 keeps random
  # one-off projects out; releases of established libraries flow through
  # the github_releases source instead.
  topics:
    - causal-inference
    - causal-machine-learning
    - causal-discovery
    - uplift-modeling
    - econometrics
    - experimentation-platform
  days_lookback: 30
  min_stars: 3

semantic_scholar:
  queries:
    - causal inference machine learning
    - heterogeneous treatment effects
    - uplift modeling
    - double machine learning
    - causal language models
    - online experimentation variance reduction
    # Tracked authors (mirrors Google Scholar alerts) — surface anything new
    - Susan Athey causal
    - Stefan Wager treatment effects
    - Guido Imbens causal
    - Miguel Hernan causal inference
    - Mark van der Laan targeted learning
    - Vasilis Syrgkanis causal
    - Nathan Kallus policy
    - Elias Bareinboim causal
    - Kun Zhang causal discovery
    - Peng Ding causal inference
  days_lookback: 2
  limit_per_query: 25

