# Canonical libraries — track for new releases / commits via the daily fetch
github_releases:
  # Old libraries with new releases / features show up here. Add freely —
  # only repos that publish GitHub releases (semver tags) get picked up.
  repos:
    # py-why ecosystem
    - py-why/dowhy
    - py-why/EconML
    - py-why/causal-learn
    - py-why/causica
    # Uber ecosystem
    - uber/causalml
    - uber/orbit
    # Microsoft
    - microsoft/showwhy
    - microsoft/responsible-ai-toolbox
    # Meta / community
    - facebookincubator/GeoLift
    - pymc-labs/CausalPy
    - WillianFuks/tfcausalimpact
    - DataCanvasIO/YLearn
    - BiomedSciAI/causallib
    - amazon-science/azcausal
    - mckinsey/causalnex
  days_lookback: 30
