profile: |
  Reader is a senior practitioner working on causal measurement and online
  experimentation. Wants a daily briefing that surfaces the most relevant new
  research, blog posts, and tools across four overlapping areas:

    1. Causal inference methodology (CATE, DML, IV, RDD, DiD, synthetic control,
       propensity methods, sensitivity analysis, observational identification)
    2. Uplift / heterogeneous treatment effects (meta-learners, conformal HTE,
       policy learning, ad incrementality, conversion lift)
    3. Online experimentation (A/B testing, variance reduction like CUPED/CUPAC,
       sequential testing, interference, switchback, geo experiments)
    4. Causal language models (causal reasoning in LLMs, counterfactual
       generation, autoregressive decoders applied to causal tasks)

  Reader is technically deep — prefers methodologically novel work, well-validated
  empirical results, and engineering blog posts that show production patterns.
  Less interested in: pure causal-discovery theory disconnected from estimation,
  generic ML papers that mention "causal" only in passing, marketing fluff.

