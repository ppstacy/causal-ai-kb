name: Weekly digest

on:
  schedule:
    # Run 30min before the claude.ai routine so the markdown is committed first.
    - cron: "30 21 * * 5"  # Friday 21:30 UTC = 2:30 PM PDT (1:30 PM PST in winter)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Roll up weekly markdown
        run: python scripts/weekly.py

      - name: Commit weekly file
        run: |
          git config user.name "causal-ai-kb-bot"
          git config user.email "causal-ai-kb-bot@users.noreply.github.com"
          git add weekly/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "weekly digest"
            git push
          fi
