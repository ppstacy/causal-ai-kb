name: Ingest URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to ingest (e.g. a paper, blog post, public LinkedIn post)"
        required: true
        type: string
      note:
        description: "Optional note about why you saved it"
        required: false
        type: string
        default: ""
  repository_dispatch:
    types: [ingest_url]  # for Slack slash command → forwarder → GitHub API

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "url=${{ github.event.client_payload.url }}" >> "$GITHUB_OUTPUT"
            echo "note=${{ github.event.client_payload.note }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ github.event.inputs.url }}" >> "$GITHUB_OUTPUT"
            echo "note=${{ github.event.inputs.note }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/ingest_url.py "${{ steps.inputs.outputs.url }}" "${{ steps.inputs.outputs.note }}"

      - name: Commit
        run: |
          git config user.name "causal-ai-kb-bot"
          git config user.email "causal-ai-kb-bot@users.noreply.github.com"
          git add submissions/ config/learned_keywords.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ingest: ${{ steps.inputs.outputs.url }}"
            git push
          fi
