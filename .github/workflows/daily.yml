name: Daily refresh

on:
  schedule:
    - cron: "0 13 * * *"  # 13:00 UTC = 06:00 PT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch + score + render
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily.py

      - name: Commit
        run: |
          git config user.name "causal-ai-kb-bot"
          git config user.email "causal-ai-kb-bot@users.noreply.github.com"
          git add daily/ config/learned_keywords.yaml || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: $(date -u +%Y-%m-%d)"
            git push
          fi
